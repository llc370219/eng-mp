<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>JS检测</title></head>
<body style="font-family:sans-serif;max-width:400px;margin:40px auto;padding:20px">
<h2>JavaScript 检测</h2>
<p id="result" style="font-size:20px;color:red;padding:20px;background:#fee">如果看到这行字，说明 JavaScript 未启用</p>
<script>
document.getElementById('result').textContent = '✅ JavaScript 已启用！可以正常使用';
document.getElementById('result').style.color = 'green';
document.getElementById('result').style.background = '#dfd';
</script>
</body>
</html>
