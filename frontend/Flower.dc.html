<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
{{ flower }}
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:140,&quot;height&quot;:140},&quot;petal&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#e34e98&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;center&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#ec6a2b&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;size&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:120,&quot;min&quot;:40,&quot;max&quot;:400,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const petal = this.props.petal || '#e34e98';
    const center = this.props.center || '#ec6a2b';
    const size = Number(this.props.size) || 120;
    const ink = '#1a1817';
    const petals = [];
    const n = 6;
    for (let i = 0; i < n; i++) {
      petals.push(React.createElement('span', {
        key: i,
        style: {
          position: 'absolute', left: '50%', top: '50%',
          width: (size * 0.36) + 'px', height: (size * 0.58) + 'px',
          background: petal, border: '2.5px solid ' + ink, borderRadius: '50% 50% 48% 48%',
          transformOrigin: '50% 100%',
          transform: `translate(-50%,-100%) rotate(${i * (360 / n)}deg)`
        }
      }));
    }
    const flower = React.createElement('div', {
      style: { position: 'relative', width: size + 'px', height: size + 'px', display: 'inline-block' }
    },
      ...petals,
      React.createElement('span', {
        key: 'c',
        style: {
          position: 'absolute', left: '50%', top: '50%',
          width: (size * 0.34) + 'px', height: (size * 0.34) + 'px',
          background: center, border: '2.5px solid ' + ink, borderRadius: '50%',
          transform: 'translate(-50%,-50%)', zIndex: 2
        }
      })
    );
    return { flower };
  }
}
</script>
</body>
</html>
